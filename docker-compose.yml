services:
  browserquest:
    build:
      context: .
      dockerfile: Dockerfile
    expose:
      - "8000"
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - browserquest_redis:/data
    expose:
      - "6379"

volumes:
  browserquest_redis:
